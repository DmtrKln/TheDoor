<section class="bid">
  <div class="container">
    <div class="bid__wrapp">
      <iframe
        class="bid__left"
        src="https://yandex.ru/map-widget/v1/?ll=73.384529%2C54.982098&z=13.44"
        width="560"
        height="400"
        frameborder="1"
        allowfullscreen="true"
        style="position: relative"
      ></iframe>
      <div class="bid__right">
        <div class="bid__formTitle">
          <h2>Оставить заявку</h2>
          <p>Заполните форму ниже и мы свяжемся с вами в ближайшее время.</p>
        </div>
        <form>
          <div class="bid__form">
            <div class="bid__field">
              <label for="name" class="bid__label">Ваше Имя</label>
              <input
                id="name"
                type="text"
                class="bid__input"
                placeholder="Иван Иванов"
                required
              />
            </div>
            <div class="bid__field">
              <label for="brand" class="bid__label">Компания/бренд</label>
              <input
                id="brand"
                type="text"
                class="bid__input"
                placeholder="ООО «Бренд»"
                required
              />
            </div>
            <div class="bid__field">
              <label for="tel" class="bid__label">Ваш телефон</label>
              <input
                id="tel"
                type="tel"
                class="bid__input mask"
                placeholder="+7 (___) ___-__-__"
                required
              />
            </div>
            <div class="bid__field">
              <label for="email" class="bid__label">Ваш e-mail</label>
              <input
                id="email"
                type="email"
                class="bid__input"
                placeholder="name@company.ru"
                required
              />
            </div>
            <div class="bid__field">
              <label for="message" class="bid__label">Потребность</label>
              <textarea
                id="message"
                class="bid__input"
                placeholder="Опишите вашу задачу или вопрос..."
              ></textarea>
            </div>
          </div>
          <div class="bid__checkbox">
            <input
              type="checkbox"
              id="checkboxbid"
              class="bid__checkboxInput"
              required
            />
            <label for="checkboxbid" class="bid__checkboxLabel">
              Обращаясь к нам, вы соглашаетесь с нашими Условиями обслуживания и
              <a href="#">Политикой конфиденциальности</a>
            </label>
          </div>
          <button class="bid__btn btn-reset" type="submit">Отправить</button>
        </form>
      </div>
    </div>
  </div>
</section>
